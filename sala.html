<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Qualificadora — Sala</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #070c18;
    --card:     #121a2c;
    --border:   #1e293b;
    --text:     #e2e8f0;
    --muted:    #94a3b8;
    --green:    #22c55e;
    --blue:     #3b82f6;
    --purple:   #a855f7;
    --orange:   #f97316;
    --red:      #ef4444;
    --indigo:   #6366f1;
    --yellow:   #eab308;
  }

  html, body {
    width: 100%; height: 100vh;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
  }

  /* ─── LAYOUT ROOT ────────────────────────────────── */
  #app {
    display: grid;
    grid-template-rows: 62px 110px 1fr 72px;
    height: 100vh;
    gap: 0;
  }

  /* ─── HEADER ─────────────────────────────────────── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    background: #0a1020;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #header .title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.04em;
  }

  #header .clock {
    font-size: 32px;
    font-weight: 300;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.06em;
  }

  #header .update {
    font-size: 13px;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #header .update .dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ─── KPI ROW ────────────────────────────────────── */
  #kpi-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    padding: 8px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .kpi-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 6px 4px;
    gap: 2px;
  }

  .kpi-card .kpi-num {
    font-size: 42px;
    font-weight: 700;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .kpi-card .kpi-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .kpi-card .kpi-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }

  /* ─── MAIN CONTENT ROW ───────────────────────────── */
  #main-row {
    display: grid;
    grid-template-columns: 1fr 1fr 220px;
    gap: 8px;
    padding: 8px 16px;
    overflow: hidden;
    min-height: 0;
  }

  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 10px 12px;
    gap: 6px;
  }

  .panel-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .panel-body {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  /* ─── RANKING ROWS ───────────────────────────────── */
  .rank-row {
    display: grid;
    grid-template-columns: 90px 1fr 32px 36px;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    flex-shrink: 0;
  }

  .rank-name {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 500;
    font-size: 11px;
  }

  .rank-bar-wrap {
    background: var(--border);
    border-radius: 3px;
    height: 12px;
    overflow: hidden;
    position: relative;
  }

  .rank-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s ease;
  }

  .rank-num {
    text-align: right;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    font-size: 13px;
  }

  .rank-future {
    font-size: 10px;
    color: var(--orange);
    text-align: right;
    white-space: nowrap;
  }

  /* ─── PRODUTO CARDS ──────────────────────────────── */
  .prod-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex-shrink: 0;
  }

  .prod-name {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .prod-nums {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .prod-re {
    font-size: 22px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }

  .prod-meta {
    font-size: 11px;
    color: var(--muted);
  }

  .prod-bar-wrap {
    background: var(--border);
    border-radius: 3px;
    height: 6px;
    overflow: hidden;
  }

  .prod-bar-fill {
    height: 100%;
    border-radius: 3px;
  }

  /* ─── PACE ROW ───────────────────────────────────── */
  #pace-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 0 16px 10px;
    flex-shrink: 0;
  }

  .pace-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .pace-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
  }

  .pace-label {
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    font-size: 10px;
  }

  .pace-nums {
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }

  .pace-bar-wrap {
    background: var(--border);
    border-radius: 4px;
    height: 14px;
    position: relative;
    overflow: visible;
  }

  .pace-bar-inner {
    position: relative;
    height: 14px;
    border-radius: 4px;
    overflow: hidden;
  }

  .pace-bar-real {
    position: absolute;
    left: 0; top: 0; height: 100%;
    border-radius: 4px 0 0 4px;
  }

  .pace-bar-future {
    position: absolute;
    top: 0; height: 100%;
    opacity: 0.5;
  }

  /* Meta marker */
  .pace-marker {
    position: absolute;
    top: -3px;
    width: 2px;
    height: 20px;
    background: var(--red);
    border-radius: 1px;
    z-index: 10;
  }

  .pace-footer {
    font-size: 10px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }

  /* ─── UTILS ──────────────────────────────────────── */
  .c-green  { color: var(--green); }
  .c-blue   { color: var(--blue); }
  .c-purple { color: var(--purple); }
  .c-orange { color: var(--orange); }
  .c-red    { color: var(--red); }
  .c-indigo { color: var(--indigo); }
  .c-yellow { color: var(--yellow); }

  .bg-green  { background: var(--green); }
  .bg-blue   { background: var(--blue); }
  .bg-purple { background: var(--purple); }
  .bg-orange { background: var(--orange); }
  .bg-red    { background: var(--red); }
  .bg-indigo { background: var(--indigo); }
  .bg-yellow { background: var(--yellow); }
</style>
</head>

<div id="app">

  <header id="header">

  </div>

  <div id="pace-row">

      </div>
      <div class="pace-bar-wrap">
        <div class="pace-bar-inner" id="pace-total-bar"></div>
        <div class="pace-marker" id="pace-total-marker" style="display:none"></div>
      </div>
      <div class="pace-footer" id="pace-total-footer"></div>
    </div>

    <div class="pace-card" id="pace-sdr">
      <div class="pace-header">
        <span class="pace-label">SDRs — RE (soma)</span>
        <span class="pace-nums" id="pace-sdr-nums">—</span>
      </div>
      <div class="pace-bar-wrap">
        <div class="pace-bar-inner" id="pace-sdr-bar"></div>
        <div class="pace-marker" id="pace-sdr-marker" style="display:none"></div>
      </div>
      <div class="pace-footer" id="pace-sdr-footer"></div>
    </div>

    <div class="pace-card" id="pace-closer">
      <div class="pace-header">
        <span class="pace-label">Closers — RE (soma)</span>
        <span class="pace-nums" id="pace-closer-nums">—</span>
      </div>
      <div class="pace-bar-wrap">
        <div class="pace-bar-inner" id="pace-closer-bar"></div>
        <div class="pace-marker" id="pace-closer-marker" style="display:none"></div>
      </div>
      <div class="pace-footer" id="pace-closer-footer"></div>
    </div>

  </div>

</div><!-- #app -->

  const closerFut = (D.closer && D.closer.future) ? D.closer.future : {};

  const totalRe    = D.totals ? (D.totals.re || 0) : 0;
  const totalFuture = D.totals ? (D.totals.future_re || 0) : 0;
  const teamGoal   = meta.team_total_re_goal || 600;
  const teamPace   = meta.team_pace_target_re || 0;

  renderPace(
    'pace-total', 'pace-total-nums', 'pace-total-bar', 'pace-total-marker', 'pace-total-footer',
    totalRe, totalFuture, teamPace, teamGoal
  );

  const sdrTotal   = sumObj(sdrRe);
  const sdrFutTot  = sumObj(sdrFut);
  const sdrGoal    = (meta.sdr_goal || 70) * 12;
  const sdrPace    = meta.sdr_pace_target ? meta.sdr_pace_target * 12 : 0;

  renderPace(
    'pace-sdr', 'pace-sdr-nums', 'pace-sdr-bar', 'pace-sdr-marker', 'pace-sdr-footer',
    sdrTotal, sdrFutTot, sdrPace, sdrGoal
  );

  const closerTotal  = sumObj(closerRe);
  const closerFutTot = sumObj(closerFut);
  // Número de closers: conta não-SDRs
  const nClosers = Object.keys(closerRe).length || 1;
  const closerGoal   = (meta.closer_goal || 40) * nClosers;
  const closerPace   = meta.closer_pace_target ? meta.closer_pace_target * nClosers : 0;

  renderPace(
    'pace-closer', 'pace-closer-nums', 'pace-closer-bar', 'pace-closer-marker', 'pace-closer-footer',
    closerTotal, closerFutTot, closerPace, closerGoal
  );
})();

// ─── AUTO-REFRESH ─────────────────────────────────────────────────────────────
setTimeout(() => location.reload(), 120000);
</script>
</body>
</html>
