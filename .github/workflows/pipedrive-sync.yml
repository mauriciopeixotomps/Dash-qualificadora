name: Sync Pipedrive Franquia Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      mes_override:
        description: 'Mês para gerar dados (ex: 2026-05). Deixe em branco para mês atual.'
        required: false
        default: ''
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Pipedrive data
        env:
          PIPEDRIVE_API_TOKEN: ${{ secrets.PIPEDRIVE_TOKEN }}
          PIPEDRIVE_COMPANY_DOMAIN: ${{ secrets.PIPEDRIVE_COMPANY_DOMAIN }}
          PIPEDRIVE_SF_TOKEN: ${{ secrets.PIPEDRIVE_SF_TOKEN }}
          MES_OVERRIDE: ${{ github.event.inputs.mes_override }}
        run: |
          python3 - <<'PYEOF'
          import json, os, time, urllib.request, urllib.parse, urllib.error
          from datetime import datetime, date, timedelta

          API_TOKEN = os.environ['PIPEDRIVE_API_TOKEN']
          DOMAIN    = os.environ['PIPEDRIVE_COMPANY_DOMAIN'].strip().rstrip('/')
          BASE      = f'https://{DOMAIN}.pipedrive.com/api/v1'
          BASE2     = f'https://{DOMAIN}.pipedrive.com/api/v2'

          def api_get(path, params=None, retries=5, v2=False):
              p = dict(params or {})
              p['api_token'] = API_TOKEN
              base = BASE2 if v2 else BASE
              url = f'{base}/{path}?' + urllib.parse.urlencode(p)
              req = urllib.request.Request(url, headers={'Accept': 'application/json'})
              for attempt in range(retries):
                  try:
                      time.sleep(0.3)
                      with urllib.request.urlopen(req, timeout=30) as r:
                          return json.loads(r.read())
                  except urllib.error.HTTPError as e:
                      if e.code == 429:
                          wait = 10 * (attempt + 1)
                          print(f"429 — aguardando {wait}s...")
                          time.sleep(wait)
                      elif e.code == 400:
                          print(f"400 Bad Request: {url}")
                          return {'data': [], 'additional_data': {}}
                      else:
                          raise
              raise RuntimeError(f"Falhou após {retries} tentativas")

          def fetch_paged(path, params, stop_fn=None, max_pages=20, v2=False):
              """Pagina até max_pages ou até stop_fn retornar True num item."""
              items, start = [], 0
              for page in range(max_pages):
                  r = api_get(path, {**params, 'limit': 100, 'start': start}, v2=v2)
                  batch = r.get('data') or []
                  if not batch:
                      break
                  if stop_fn:
                      keep = []
                      for item in batch:
                          if stop_fn(item):
                              items.extend(keep)
                              return items, True   # parou cedo
                          keep.append(item)
                      items.extend(keep)
                  else:
                      items.extend(batch)
                  more = (r.get('additional_data') or {}).get('pagination', {}).get('more_items_in_collection', False)
                  if not more:
                      break
                  start += len(batch)
                  print(f"  {path}: {len(items)} itens...")
              return items, False

          # ── Mês (atual ou override) ─────────────────────────────────
          mes_override = os.environ.get('MES_OVERRIDE', '').strip()
          if mes_override and len(mes_override) == 7:
              ano, mon = int(mes_override[:4]), int(mes_override[5:7])
              today = date(ano, mon, 28)   # usa dia 28 para evitar problemas de fim de mês
              mes   = mes_override
          else:
              today = date.today()
              mes   = today.strftime('%Y-%m')
          month_start = f'{mes}-01'
          last_day = (date(today.year, today.month % 12 + 1, 1) - timedelta(days=1)) if today.month < 12 else date(today.year, 12, 31)
          month_end   = last_day.strftime('%Y-%m-%d')
          # Arquivo de saída: pipedrive-data.json (atual) ou pipedrive-data-YYYY-MM.json
          output_file = 'pipedrive-data.json' if not mes_override else f'pipedrive-data-{mes}.json'
          print(f"Mês: {mes} | Arquivo: {output_file}")

          # ── Listar TODOS os pipelines ───────────────────────────────
          resp = api_get('pipelines')
          print("Todos os pipelines:")
          for pl in (resp.get('data') or []):
              print(f"  id={pl['id']} name={pl['name']}")

          # ── Pipeline de franquia ────────────────────────────────────
          pipeline_id = None
          for pl in (resp.get('data') or []):
              if any(k in pl['name'].lower() for k in ('franquia', 'expansao', 'expansão')):
                  pipeline_id = pl['id']
                  print(f"Pipeline selecionado: {pl['name']} (id={pipeline_id})")
                  break
          if not pipeline_id:
              raise SystemExit("Pipeline de franquia não encontrado!")

          # ── Stages ─────────────────────────────────────────────────
          stage_map = {s['id']: s['name'] for s in (api_get('stages', {'pipeline_id': pipeline_id}).get('data') or [])}

          # ── Tipo "CC1 Realizada" — descobre a chave correta ──────────
          all_types = {}
          for at in (api_get('activityTypes').get('data') or []):
              key  = (at.get('key_string') or at.get('key') or '').lower()
              name = (at.get('name') or '').lower()
              print(f"  ALL_TYPE: key={repr(key)} name={repr(name)}")
              if key:
                  all_types[key] = name
          # Encontra a chave da "CC1 Realizada"
          cc1_keys = [k for k, n in all_types.items()
                      if 'cc1' in k or 'cc1' in n or ('realiz' in n and 'cc1' in n)]
          if not cc1_keys:
              # fallback: qualquer tipo com "realizada" no nome que seja cc
              cc1_keys = [k for k, n in all_types.items() if 'realiz' in n]
          if not cc1_keys:
              cc1_keys = ['meeting']
          print(f"Chaves CC1 usadas: {cc1_keys}")

          # ── Closers da Franquia — precisa vir antes de contratos e meetings
          FRANQUIA_CLOSERS = {
              'adalberto neto', 'bruna salazar', 'felippe porcella', 'fred',
              'gabriel meneses', 'leonardo ribeiro', 'lorenzo coronel',
              'samuel brião', 'suzanny mauren dihelem', 'thuany ghabril',
              'william dias', 'émerson cavitchoni', 'emerson cavitchoni',
          }
          users_resp = api_get('users')
          franquia_user_ids = set()
          for u in (users_resp.get('data') or []):
              name = str(u.get('name') or '').lower().strip()
              uid  = u.get('id')
              if uid and (any(c in name for c in FRANQUIA_CLOSERS) or name in FRANQUIA_CLOSERS):
                  franquia_user_ids.add(str(uid))
                  print(f"  Closer Franquia: {u['name']} (id={uid})")
          print(f"User IDs Franquia: {franquia_user_ids}")

          # ── Contratos: won do mês pelo closer da Franquia ─────────────
          print("Buscando contratos (won)...")
          def before_month(d):
              t = (d.get('won_time') or d.get('close_time') or '')[:7]
              return bool(t) and t < mes
          won_deals, _ = fetch_paged('deals',
              {'pipeline_id': pipeline_id, 'status': 'won', 'sort': 'close_time DESC'},
              stop_fn=before_month, max_pages=10)
          contratos_mes, contratos_por_dia = 0, {}
          from datetime import timezone as _tz
          for d in won_deals:
              wt       = d.get('won_time') or ''
              owner_id = str(d.get('user_id') or d.get('owner_id') or '')
              if not wt:
                  continue
              try:
                  dt_utc   = datetime.strptime(wt[:19], '%Y-%m-%d %H:%M:%S').replace(tzinfo=_tz.utc)
                  won_date = (dt_utc - timedelta(hours=3)).strftime('%Y-%m-%d')
              except Exception:
                  won_date = wt[:10]
              if won_date.startswith(mes) and owner_id in franquia_user_ids:
                  contratos_mes += 1
                  contratos_por_dia[won_date] = contratos_por_dia.get(won_date, 0) + 1
          print(f"Contratos no mês: {contratos_mes}")

          # ── Funil: open deals (máx 20 páginas = 2000 deals)
          print("Buscando funil (open)...")
          open_deals, _ = fetch_paged('deals',
              {'pipeline_id': pipeline_id, 'status': 'open'}, max_pages=20)
          funil_franquia = {}
          for d in open_deals:
              stage = stage_map.get(d.get('stage_id'), 'Desconhecida')
              funil_franquia[stage] = funil_franquia.get(stage, 0) + 1
          print(f"Deals em aberto: {sum(funil_franquia.values())}")

          # ── CC1 Realizadas — busca por user_id (preciso e sem limite de recents)
          print(f"Buscando meetings por user_id (done, tipo=meeting)...")
          reunioes_mes, reunioes_por_dia = 0, {}
          reunioes_total = 0

          # Todos os user IDs da conta (para contar total da equipe)
          all_user_ids = [str(u['id']) for u in (users_resp.get('data') or []) if u.get('id')]

          def get_meetings_for_user(uid):
              """Retorna meetings concluídas do mês para um user_id."""
              acts, _ = fetch_paged('activities', {
                  'user_id': uid,
                  'type':    'meeting',
                  'done':    1,
              }, max_pages=30)
              result = []
              for a in acts:
                  due = (a.get('due_date') or '')[:10]
                  if due.startswith(mes):
                      result.append(a)
              return result

          # Conta meetings Franquia
          for uid in franquia_user_ids:
              user_acts = get_meetings_for_user(uid)
              for act in user_acts:
                  due = (act.get('due_date') or '')[:10]
                  reunioes_mes += 1
                  reunioes_por_dia[due] = reunioes_por_dia.get(due, 0) + 1
          print(f"Reuniões Franquia no mês: {reunioes_mes}")

          # Conta total (todos os users com meetings no mês)
          seen_ids = set()
          for uid in all_user_ids:
              user_acts = get_meetings_for_user(uid)
              for act in user_acts:
                  act_id = act.get('id')
                  if act_id and act_id not in seen_ids:
                      seen_ids.add(act_id)
                      reunioes_total += 1
          print(f"Reuniões total equipe no mês: {reunioes_total}")

          # ── Taxa e dias úteis ───────────────────────────────────────
          taxa = round(contratos_mes / reunioes_mes * 100, 2) if reunioes_mes > 0 else 0.0
          dias_uteis = sum(1 for i in range((today - date(today.year, today.month, 1)).days + 1)
                          if (date(today.year, today.month, 1) + timedelta(i)).weekday() < 5)

          # ── Caixa realizado — Pipedrive Studio Fiscal (grupostudioexp) ──
          caixa_realizado = None
          SF_TOKEN = os.environ.get('PIPEDRIVE_SF_TOKEN', '').strip()
          if SF_TOKEN:
              SF_BASE = 'https://grupostudioexp.pipedrive.com/api/v1'

              def sf_get(path, params=None, retries=5):
                  p = dict(params or {}); p['api_token'] = SF_TOKEN
                  url = f'{SF_BASE}/{path}?' + urllib.parse.urlencode(p)
                  req2 = urllib.request.Request(url, headers={'Accept': 'application/json'})
                  for attempt in range(retries):
                      try:
                          time.sleep(0.3)
                          with urllib.request.urlopen(req2, timeout=30) as r:
                              return json.loads(r.read())
                      except urllib.error.HTTPError as e:
                          if e.code == 429:
                              time.sleep(10 * (attempt + 1))
                          elif e.code == 400:
                              return {'data': [], 'additional_data': {}}
                          else:
                              raise
                  raise RuntimeError('SF: falhou após tentativas')

              def sf_fetch_paged(path, params, max_pages=20):
                  items, start = [], 0
                  for _ in range(max_pages):
                      r = sf_get(path, {**params, 'limit': 100, 'start': start})
                      batch = r.get('data') or []
                      if not batch: break
                      items.extend(batch)
                      more = (r.get('additional_data') or {}).get('pagination', {}).get('more_items_in_collection', False)
                      if not more: break
                      start += len(batch)
                  return items

              # Auto-descobrir pipeline de Franquia na SF
              sf_pipelines = sf_get('pipelines').get('data') or []
              print("SF pipelines:")
              for pl in sf_pipelines: print(f"  id={pl['id']} name={pl['name']}")
              sf_pipeline_id = None
              for pl in sf_pipelines:
                  if any(k in pl['name'].lower() for k in ('franquia', 'expansao', 'expansão')):
                      sf_pipeline_id = pl['id']
                      print(f"SF pipeline selecionado: {pl['name']} (id={sf_pipeline_id})")
                      break
              if sf_pipeline_id:
                  # Descobrir stage final do pipeline (ex: "CONTRATO ENVIADO")
                  sf_stages = sf_get('stages', {'pipeline_id': sf_pipeline_id}).get('data') or []
                  sf_stage_ids = [s['id'] for s in sf_stages]
                  sf_last_stage_id = max(sf_stage_ids) if sf_stage_ids else None
                  print(f"SF stages: {[s['name'] for s in sf_stages]}")
                  print(f"SF stage final (contrato): id={sf_last_stage_id}")

                  sf_won_items = sf_fetch_paged('deals', {'pipeline_id': sf_pipeline_id, 'status': 'won'})
                  caixa_realizado = 0
                  contratos_sf    = 0
                  for d in sf_won_items:
                      wt = d.get('won_time') or ''
                      if not wt: continue
                      # Só contar deals que estavam no stage final (CONTRATO ENVIADO)
                      if sf_last_stage_id and d.get('stage_id') != sf_last_stage_id:
                          continue
                      try:
                          dt_utc = datetime.strptime(wt[:19], '%Y-%m-%d %H:%M:%S').replace(tzinfo=_tz.utc)
                          won_date = (dt_utc - timedelta(hours=3)).strftime('%Y-%m-%d')
                      except Exception:
                          won_date = wt[:10]
                      if won_date.startswith(mes):
                          caixa_realizado += float(d.get('value') or 0)
                          contratos_sf    += 1
                  print(f"SF: {contratos_sf} contratos (stage final), Caixa R$ {caixa_realizado:,.2f}")
              else:
                  print("SF: pipeline de Franquia não encontrado — caixa=null")
          else:
              print("PIPEDRIVE_SF_TOKEN não configurado — caixa=null")

          # ── UPs e comissão ─────────────────────────────────────────────
          UP_FRANQUIAS = 4
          UP_CAIXA     = 140_000
          franquias_vendidas = contratos_sf if SF_TOKEN and sf_pipeline_id else contratos_mes
          up_f = franquias_vendidas // UP_FRANQUIAS
          up_c = int(caixa_realizado // UP_CAIXA) if caixa_realizado is not None else None
          ups  = min(up_f, up_c) if up_c is not None else None
          comissao_variavel = max(0, (ups - 1)) * 5000 if ups is not None else None
          print(f"UPs: Franquias={up_f} ({franquias_vendidas} vendidas), Caixa={up_c}, total={ups}, comissão=R${comissao_variavel}")

          output = {
              'generated_at':          datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
              'mes':                   mes,
              'reunioes_franquia':     reunioes_mes,
              'reunioes_total':        reunioes_total,
              'reunioes_mes':          reunioes_mes,
              'contratos_mes':         contratos_mes,
              'franquias_vendidas':    franquias_vendidas,
              'taxa_conversao_pct':    taxa,
              'reunioes_por_dia':      dict(sorted(reunioes_por_dia.items())),
              'contratos_por_dia':     dict(sorted(contratos_por_dia.items())),
              'funil_franquia':        funil_franquia,
              'pipeline_id':           pipeline_id,
              'dias_uteis_decorridos': dias_uteis,
              'caixa_realizado':       caixa_realizado,
              'up_franquias':          up_f,
              'up_caixa':              up_c,
              'ups_completos':         ups,
              'comissao_variavel':     comissao_variavel,
          }
          with open(output_file, 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False, indent=2)
          print(f"OK — {reunioes_mes} RE-Franquia, {reunioes_total} RE-Total, {franquias_vendidas} franquias vendidas, caixa={caixa_realizado}, {ups} UPs")
          PYEOF

      - name: Commit & push pipedrive-data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pipedrive-data.json pipedrive-data-*.json 2>/dev/null || true
          git diff --cached --quiet && echo "Sem alterações." || \
            git commit -m "chore: atualizar dados Pipedrive [skip ci]" && git push
