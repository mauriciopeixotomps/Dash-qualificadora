name: Atualiza Dashboard

on:
  schedule:
    - cron: '0,30 11-21 * * 1-5'
    - cron: '0 21 * * 6'
  workflow_dispatch:
  # Encadeia no workflow "Sync Pipedrive Franquia Data" (roda de hora em hora, confiável)
  # — garante atualização do dashboard mesmo se o schedule/cron externo falhar.
  workflow_run:
    workflows: ["Sync Pipedrive Franquia Data"]
    types: [completed]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Instala dependências
        run: pip install pandas openpyxl
      - name: Fetch Pipedrive
        env:
          PIPEDRIVE_TOKEN: ${{ secrets.PIPEDRIVE_TOKEN }}
        run: python3 fetch_pipedrive.py
      - name: Build Maio 2026
        run: python3 build_from_xlsx_maio.py
      - name: Build Junho 2026
        run: python3 build_from_xlsx_junho.py
      - name: Build Sala TV — Maio
        run: python3 build_sala.py
      - name: Build Sala TV — Junho
        run: python3 build_sala_junho.py
      - name: Publica HTMLs no repo
        run: |
          # Salva os HTMLs recém-gerados fora do git
          mkdir -p /tmp/out
          cp publish/maio-2026.html  /tmp/out/
          cp publish/junho-2026.html /tmp/out/
          cp publish/sala.html       /tmp/out/
          cp publish/sala-junho.html /tmp/out/
          # Sincroniza com o remoto (descarta qualquer divergência local)
          git fetch origin main
          git reset --hard origin/main
          # Reaplica os HTMLs gerados por cima da versão mais recente
          cp /tmp/out/maio-2026.html  maio-2026.html
          cp /tmp/out/junho-2026.html junho-2026.html
          cp /tmp/out/sala.html       sala.html
          cp /tmp/out/sala-junho.html sala-junho.html
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add maio-2026.html junho-2026.html sala.html sala-junho.html
          if git diff --cached --quiet; then
            echo "= Sem mudanças, nada a comitar."
          else
            git commit -m "Auto-update $(TZ=America/Sao_Paulo date '+%d/%m/%Y %H:%M BRT')"
            git push
            echo "✓ Dashboard atualizado"
          fi
