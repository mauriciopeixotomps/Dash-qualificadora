name: Atualiza Dashboard

on:
  schedule:
    - cron: '0,30 11-21 * * 1-5'
    - cron: '0 21 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instala dependências
        run: pip install pandas openpyxl

      - name: Fetch Pipedrive
        env:
          PIPEDRIVE_TOKEN: ${{ secrets.PIPEDRIVE_TOKEN }}
        run: python3 fetch_pipedrive.py

      - name: Build Maio 2026
        run: python3 build_from_xlsx_maio.py

      - name: Build Sala TV
        run: python3 build_sala.py

      - name: Publica HTMLs
        run: |
          cp publish/maio-2026.html maio-2026.html
          cp publish/sala.html sala.html
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add maio-2026.html sala.html
          if git diff --cached --quiet; then
            echo "Sem mudanças"
          else
            git commit -m "Auto-update $(TZ=America/Sao_Paulo date '+%d/%m %H:%M BRT')"
            git push
          fi
