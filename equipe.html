<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Comissão — Equipe Expansão</title>
<!-- captura o hash ANTES do Supabase limpá-lo -->
<script>window.__initialHash = window.location.hash;</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #070c18; --card: #121a2c; --card2: #0f172a; --border: #1e293b;
  --text: #e2e8f0; --muted: #94a3b8; --dim: #64748b;
  --green: #22c55e; --amber: #f59e0b; --red: #ef4444;
  --purple: #a855f7; --cyan: #06b6d4; --blue: #3b82f6; --gold: #eab308;
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; min-height: 100vh; }

/* ── LOGIN ── */
#login-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 20px;
}
.login-box {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 32px; width: 100%; max-width: 380px;
}
.login-logo { font-size: 22px; font-weight: 800; color: #f1f5f9; margin-bottom: 6px; }
.login-sub  { font-size: 12px; color: var(--muted); margin-bottom: 24px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; }
.field input {
  width: 100%; background: var(--card2); border: 1px solid var(--border);
  color: #f1f5f9; font-size: 15px; padding: 10px 12px; border-radius: 7px;
}
.field input:focus { outline: none; border-color: var(--cyan); }
.btn-login {
  width: 100%; background: var(--cyan); color: #000; font-size: 14px; font-weight: 700;
  padding: 11px; border-radius: 7px; border: none; cursor: pointer; margin-top: 6px;
}
.btn-login:hover { background: #22d3ee; }
.login-err { color: var(--red); font-size: 12px; margin-top: 10px; min-height: 18px; }
.login-ok  { color: var(--green); font-size: 12px; margin-top: 10px; }
.link-btn  { background: none; border: none; color: var(--cyan); font-size: 12px; cursor: pointer; padding: 0; margin-top: 12px; display: block; text-align: center; }
.link-btn:hover { text-decoration: underline; }

/* ── APP ── */
#app-screen { display: none; padding: 20px; max-width: 1100px; margin: 0 auto; }

.topbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border);
}
.topbar-title { font-size: 18px; font-weight: 700; color: #f1f5f9; }
.topbar-user  { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 10px; }
.btn-logout { background: none; border: 1px solid var(--border); color: var(--muted); font-size: 11px; padding: 4px 10px; border-radius: 5px; cursor: pointer; }
.btn-logout:hover { border-color: var(--red); color: var(--red); }

/* ── CARDS EQUIPE (admin) ── */
.team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
.member-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px; cursor: pointer; transition: border-color .2s;
}
.member-card:hover { border-color: var(--cyan); }
.mc-role  { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 6px; }
.mc-name  { font-size: 16px; font-weight: 700; color: #f1f5f9; margin-bottom: 12px; }
.mc-ups   { font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; }
.mc-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
.mc-comissao { font-size: 18px; font-weight: 700; margin-top: 10px; }
.mc-bar-track { background: #1e293b; height: 6px; border-radius: 3px; margin-top: 10px; overflow: hidden; }
.mc-bar-fill  { height: 100%; border-radius: 3px; background: var(--cyan); transition: width .4s; }

/* ── DASHBOARD INDIVIDUAL ── */
#detail-screen { display: none; padding: 20px; max-width: 960px; margin: 0 auto; }
.back-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-size: 12px; padding: 6px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 16px; display: inline-flex; align-items: center; gap: 6px; }
.back-btn:hover { border-color: var(--cyan); color: var(--cyan); }

.card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 14px; }
.card h2 {
  font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
  color: var(--muted); display: flex; align-items: center; gap: 6px;
  padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 14px;
}
.card h2::before { content: ''; display: inline-block; width: 3px; height: 14px; border-radius: 2px; background: var(--accent, var(--muted)); flex-shrink: 0; }

.big  { font-size: 48px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
.med  { font-size: 30px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
.label    { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
.sublabel { font-size: 11px; color: var(--dim); margin-top: 4px; }
.grid2    { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

.prog-track { background: #1e293b; height: 20px; border-radius: 6px; overflow: hidden; margin: 10px 0 4px; }
.prog-fill  { height: 100%; border-radius: 6px 0 0 6px; transition: width .4s; }

/* UP cards */
.up-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: nowrap; }
.up-card { flex: 1; padding: 10px 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--card2); text-align: center; position: relative; min-width: 0; }
.up-card.active { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold); }
.up-card .uc-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
.up-card .uc-up  { font-size: 18px; font-weight: 700; }
.up-card .uc-val { font-size: 10px; color: var(--dim); margin-top: 3px; }
.up-card .uc-badge { position: absolute; top: -9px; left: 50%; transform: translateX(-50%); font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 999px; background: var(--gold); color: #000; white-space: nowrap; }

.comp-block { background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 12px; }
.comp-block .cb-title { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.comp-block .cb-title::before { content: ''; width: 3px; height: 12px; border-radius: 2px; background: var(--cb-color, var(--muted)); display: inline-block; }

/* SDR gauge */
.sdr-gauge { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.gauge-block { background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; text-align: center; }
.gauge-pct { font-size: 36px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; margin: 6px 0; }
.gauge-meta { font-size: 11px; color: var(--dim); }
.gauge-bar-wrap { background: #1e293b; height: 8px; border-radius: 4px; margin-top: 8px; overflow: hidden; }
.gauge-bar-fill { height: 100%; border-radius: 4px; transition: width .4s; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; }
.badge.green { background: rgba(34,197,94,.2);  color: #4ade80; }
.badge.amber { background: rgba(245,158,11,.2); color: #fbbf24; }
.badge.gold  { background: rgba(234,179,8,.2);  color: var(--gold); }
.badge.red   { background: rgba(239,68,68,.2);  color: #f87171; }
.badge.dim   { background: rgba(100,116,139,.15); color: var(--muted); }

.ts  { font-size: 11px; color: var(--dim); margin-top: 12px; }
.loading { color: var(--muted); font-size: 13px; padding: 40px; text-align: center; }

@media (max-width: 600px) {
  .grid2 { grid-template-columns: 1fr; }
  .sdr-gauge { grid-template-columns: 1fr; }
  .team-grid { grid-template-columns: 1fr; }
  .up-row { flex-wrap: wrap; }
  .big { font-size: 38px; }
}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-box" id="login-box">
    <div class="login-logo">Grupo Studio</div>
    <div class="login-sub">Painel de Comissão — Equipe Expansão</div>
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="inp-email" placeholder="seu@grupostudio.com.br" autocomplete="email">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="inp-senha" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" id="btn-login">Entrar</button>
    <div class="login-err" id="login-err"></div>
    <button class="link-btn" id="btn-forgot">Esqueci minha senha</button>
  </div>

  <!-- tela recuperação -->
  <div class="login-box" id="forgot-box" style="display:none;">
    <div class="login-logo">Grupo Studio</div>
    <div class="login-sub">Recuperação de senha</div>
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="inp-reset-email" placeholder="seu@grupostudio.com.br" autocomplete="email">
    </div>
    <button class="btn-login" id="btn-send-reset">Enviar link de redefinição</button>
    <div class="login-ok" id="reset-ok" style="display:none;">Link enviado! Verifique seu e-mail.</div>
    <div class="login-err" id="reset-err"></div>
    <button class="link-btn" id="btn-back-login">← Voltar para o login</button>
  </div>

  <!-- tela nova senha (após clicar no link do email) -->
  <div class="login-box" id="newpwd-box" style="display:none;">
    <div class="login-logo">Grupo Studio</div>
    <div class="login-sub">Defina sua nova senha</div>
    <div class="field">
      <label>Nova senha</label>
      <input type="password" id="inp-newpwd" placeholder="mínimo 6 caracteres">
    </div>
    <div class="field">
      <label>Confirmar senha</label>
      <input type="password" id="inp-newpwd2" placeholder="repita a senha">
    </div>
    <button class="btn-login" id="btn-set-pwd">Salvar nova senha</button>
    <div class="login-err" id="newpwd-err"></div>
  </div>
</div>

<!-- ── APP (admin) ── -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-title">🏆 Comissão — Equipe Expansão</div>
    <div class="topbar-user">
      <span id="user-email-display"></span>
      <button class="btn-logout" id="btn-logout">Sair</button>
    </div>
  </div>
  <div id="mes-label" style="font-size:12px;color:var(--muted);margin-bottom:16px;"></div>
  <div id="team-cards" class="team-grid">
    <div class="loading">Carregando dados da equipe...</div>
  </div>
</div>

<!-- ── DETALHE INDIVIDUAL ── -->
<div id="detail-screen">
  <button class="back-btn" id="btn-back">← Voltar</button>
  <div id="detail-content"></div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// CONFIGURAÇÃO — substitua com suas credenciais do Supabase
// ─────────────────────────────────────────────────────────────
const SUPABASE_URL  = 'https://equgygqekmwadgoybevh.supabase.co';
const SUPABASE_ANON = 'sb_publishable_iqsCipk--2NuAZHZJYinoQ_U_oTzgFS';
const ADMIN_EMAIL   = 'mauricio.peixoto.mps@gmail.com';
// ─────────────────────────────────────────────────────────────

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const BRL = v => 'R$ ' + Math.round(v || 0).toLocaleString('pt-BR');
const Pct = v => (v || 0).toFixed(1) + '%';

// ── ESTRUTURAS DE COMISSÃO ──────────────────────────────────
const ROLES = {
  closer: {
    label: 'Closer',
    upF: 1, upC: 35_000,
    comissao: ups => ups < 2 ? 0 : (ups - 1) * 2_500,
    maxUP: 6,
  },
  sdr: {
    label: 'Qualificador (SDR)',
    comissao: (up1) => up1 ? 2_000 : 0,
    minAgend: 30, minRealiz: 65,
  },
  gerente: {
    label: 'Gerente de Expansão',
    upF: 4, upC: 140_000,
    comissao: ups => ups < 2 ? 0 : (ups - 1) * 5_000,
    maxUP: 5,
  },
  gestor: {
    label: 'Gestor de Qualificação',
    upF: 8, upC: 280_000,
    comissao: ups => ups < 2 ? 0 : (ups - 1) * 10_000,
    maxUP: 4,
  },
};

function calcUPs(role, data) {
  const r = ROLES[role];
  if (role === 'sdr') {
    const ok = (data.taxa_agendamento >= r.minAgend) && (data.taxa_realizacao >= r.minRealiz);
    return { ups: ok ? 1 : 0, upF: null, upC: null };
  }
  const upF = Math.floor((data.franquias_vendidas || 0) / r.upF);
  const upC = data.caixa_realizado != null ? Math.floor(data.caixa_realizado / r.upC) : null;
  const ups  = upC != null ? Math.min(upF, upC) : upF;
  return { ups, upF, upC };
}

// ── AUTH ────────────────────────────────────────────────────
async function login() {
  const email = document.getElementById('inp-email').value.trim();
  const senha = document.getElementById('inp-senha').value;
  document.getElementById('login-err').textContent = '';
  document.getElementById('btn-login').textContent = 'Entrando...';
  const { error } = await sb.auth.signInWithPassword({ email, password: senha });
  document.getElementById('btn-login').textContent = 'Entrar';
  if (error) {
    document.getElementById('login-err').textContent = 'E-mail ou senha incorretos.';
    return;
  }
  showApp();
}

document.getElementById('btn-login').addEventListener('click', login);
document.getElementById('inp-senha').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

// ── ESQUECI MINHA SENHA ─────────────────────────────────────
document.getElementById('btn-forgot').addEventListener('click', () => {
  document.getElementById('login-box').style.display = 'none';
  document.getElementById('forgot-box').style.display = 'block';
  const email = document.getElementById('inp-email').value.trim();
  if (email) document.getElementById('inp-reset-email').value = email;
});

document.getElementById('btn-back-login').addEventListener('click', () => {
  document.getElementById('forgot-box').style.display = 'none';
  document.getElementById('login-box').style.display = 'block';
});

document.getElementById('btn-send-reset').addEventListener('click', async () => {
  const email = document.getElementById('inp-reset-email').value.trim();
  document.getElementById('reset-err').textContent = '';
  document.getElementById('reset-ok').style.display = 'none';
  if (!email) { document.getElementById('reset-err').textContent = 'Informe seu e-mail.'; return; }
  document.getElementById('btn-send-reset').textContent = 'Enviando...';
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://mauriciopeixotomps.github.io/Dash-qualificadora/equipe.html',
  });
  document.getElementById('btn-send-reset').textContent = 'Enviar link de redefinição';
  if (error) { document.getElementById('reset-err').textContent = error.message; return; }
  document.getElementById('reset-ok').style.display = 'block';
});

// ── NOVA SENHA (callback do link de email) ──────────────────
document.getElementById('btn-set-pwd').addEventListener('click', async () => {
  const p1 = document.getElementById('inp-newpwd').value;
  const p2 = document.getElementById('inp-newpwd2').value;
  document.getElementById('newpwd-err').textContent = '';
  if (p1.length < 6) { document.getElementById('newpwd-err').textContent = 'Mínimo 6 caracteres.'; return; }
  if (p1 !== p2)     { document.getElementById('newpwd-err').textContent = 'As senhas não coincidem.'; return; }
  document.getElementById('btn-set-pwd').textContent = 'Salvando...';
  const { error } = await sb.auth.updateUser({ password: p1 });
  document.getElementById('btn-set-pwd').textContent = 'Salvar nova senha';
  if (error) { document.getElementById('newpwd-err').textContent = error.message; return; }
  // senha salva → vai para o app
  showApp();
});

document.getElementById('btn-logout').addEventListener('click', async () => {
  await sb.auth.signOut();
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('detail-screen').style.display = 'none';
});

document.getElementById('btn-back').addEventListener('click', () => {
  document.getElementById('detail-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
});

// ── INICIALIZAÇÃO ───────────────────────────────────────────
function showNewPwdScreen() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-box').style.display = 'none';
  document.getElementById('forgot-box').style.display = 'none';
  document.getElementById('newpwd-box').style.display = 'block';
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('detail-screen').style.display = 'none';
}

// Detectar token de recuperação capturado ANTES do Supabase limpar o hash
const hashParams = new URLSearchParams((window.__initialHash || '').replace('#', ''));
const queryParams = new URLSearchParams(window.location.search);
const isRecovery = hashParams.get('type') === 'recovery' || queryParams.get('type') === 'recovery';
if (isRecovery) showNewPwdScreen();

sb.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    showNewPwdScreen();
  } else if (session && !isRecovery) {
    showApp();
  } else if (!session && !isRecovery) {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-box').style.display = 'block';
    document.getElementById('forgot-box').style.display = 'none';
    document.getElementById('newpwd-box').style.display = 'none';
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('detail-screen').style.display = 'none';
  }
});

async function showApp() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('user-email-display').textContent = user.email;

  const isAdmin = user.email === ADMIN_EMAIL;

  if (isAdmin) {
    document.getElementById('app-screen').style.display = 'block';
    loadTeam();
  } else {
    // membro: vai direto para o próprio dashboard
    document.getElementById('app-screen').style.display = 'none';
    showDetailForUser(user.email);
  }
}

// ── VISÃO ADMIN — todos os membros ─────────────────────────
async function loadTeam() {
  const { data, error } = await sb
    .from('commission_data')
    .select('*, profiles(name, role, email)')
    .order('mes', { ascending: false });

  if (error || !data?.length) {
    document.getElementById('team-cards').innerHTML =
      '<div class="loading">Nenhum dado disponível ainda. Execute o workflow para gerar os dados.</div>';
    return;
  }

  // Pegar mês mais recente
  const latestMes = data[0].mes;
  document.getElementById('mes-label').textContent = `Mês de referência: ${latestMes}`;

  const mesData = data.filter(d => d.mes === latestMes);

  document.getElementById('team-cards').innerHTML = mesData.map(d => {
    const profile = d.profiles;
    const role    = profile?.role || 'closer';
    const { ups } = calcUPs(role, d);
    const comissao = ROLES[role]?.comissao(ups) || 0;
    const cor = comissao > 0 ? 'var(--green)' : ups >= 1 ? 'var(--amber)' : 'var(--muted)';
    const maxUP = ROLES[role]?.maxUP || 1;
    const progPct = Math.min((ups / maxUP) * 100, 100);
    const roleLabel = ROLES[role]?.label || role;

    return `
    <div class="member-card" onclick="showDetailForEmail('${profile?.email}')">
      <div class="mc-role">${roleLabel}</div>
      <div class="mc-name">${profile?.name || profile?.email || '—'}</div>
      <div class="label">UPs completas</div>
      <div class="mc-ups" style="color:${cor}">${ups}</div>
      <div class="mc-label">UP${ups !== 1 ? 's' : ''}</div>
      <div class="mc-comissao" style="color:${comissao > 0 ? 'var(--green)' : 'var(--muted)'}">${BRL(comissao)}</div>
      <div class="mc-bar-track"><div class="mc-bar-fill" style="width:${progPct}%;background:${cor}"></div></div>
    </div>`;
  }).join('');
}

async function showDetailForEmail(email) {
  document.getElementById('app-screen').style.display = 'none';
  showDetailForUser(email);
}

// ── DASHBOARD INDIVIDUAL ────────────────────────────────────
async function showDetailForUser(email) {
  document.getElementById('detail-screen').style.display = 'block';
  document.getElementById('detail-content').innerHTML = '<div class="loading">Carregando...</div>';

  const { data: profile } = await sb.from('profiles').select('*').eq('email', email).single();
  const { data: rows } = await sb.from('commission_data')
    .select('*').eq('user_id', profile?.id).order('mes', { ascending: false }).limit(1);

  const d    = rows?.[0];
  const role = profile?.role || 'closer';
  renderDetail(profile, d, role);
}

function renderDetail(profile, d, role) {
  const name    = profile?.name || profile?.email || '—';
  const mes     = d?.mes || '—';
  const gerado  = d?.generated_at ? new Date(d.generated_at).toLocaleString('pt-BR') : '—';

  let html = `<h1 style="font-size:20px;font-weight:700;color:#f1f5f9;margin-bottom:4px;">${name}</h1>
  <div style="font-size:12px;color:var(--muted);margin-bottom:20px;">${ROLES[role]?.label || role} · Mês: ${mes} · Atualizado: ${gerado}</div>`;

  if (role === 'sdr') {
    html += renderSDR(d);
  } else {
    html += renderCloser(d, role);
  }

  document.getElementById('detail-content').innerHTML = html;
}

function renderSDR(d) {
  const leads    = d?.leads_recebidos  || 0;
  const agend    = d?.cc1_agendadas    || 0;
  const realiz   = d?.cc1_realizadas   || 0;
  const txAgend  = leads  > 0 ? agend  / leads  * 100 : 0;
  const txRealiz = agend  > 0 ? realiz / agend  * 100 : 0;
  const okAgend  = txAgend  >= 30;
  const okRealiz = txRealiz >= 65;
  const up1      = okAgend && okRealiz;
  const comissao = up1 ? 2000 : 0;
  const corAg    = okAgend  ? 'var(--green)' : 'var(--red)';
  const corRe    = okRealiz ? 'var(--green)' : 'var(--red)';

  return `
  <div class="card" style="--accent:var(--gold);">
    <h2 style="--accent:var(--gold);">Resultado</h2>
    <div style="display:flex;align-items:center;gap:20px;margin-bottom:20px;">
      <div>
        <div class="label">Status da UP</div>
        <div class="med" style="color:${up1 ? 'var(--green)' : 'var(--red)'};margin-top:4px;">${up1 ? '✓ UP Validada' : '✗ UP não atingida'}</div>
      </div>
      <div style="flex:1;text-align:right;">
        <div class="label">Comissão variável</div>
        <div class="big" style="color:${comissao > 0 ? 'var(--green)' : 'var(--muted)'};margin-top:4px;">${BRL(comissao)}</div>
      </div>
    </div>
  </div>

  <div class="card" style="--accent:var(--cyan);">
    <h2 style="--accent:var(--cyan);">Indicadores</h2>
    <div class="sdr-gauge">
      <div class="gauge-block">
        <div class="label">Taxa de Agendamento</div>
        <div class="gauge-pct" style="color:${corAg}">${Pct(txAgend)}</div>
        <div class="gauge-meta">${agend} agendadas / ${leads} leads · meta: 30%</div>
        <div class="gauge-bar-wrap"><div class="gauge-bar-fill" style="width:${Math.min(txAgend/30*100,100)}%;background:${corAg}"></div></div>
        <div style="margin-top:8px;">${okAgend ? '<span class="badge green">✓ Meta atingida</span>' : '<span class="badge red">✗ Abaixo da meta</span>'}</div>
      </div>
      <div class="gauge-block">
        <div class="label">Taxa de Realização CC1</div>
        <div class="gauge-pct" style="color:${corRe}">${Pct(txRealiz)}</div>
        <div class="gauge-meta">${realiz} realizadas / ${agend} agendadas · meta: 65%</div>
        <div class="gauge-bar-wrap"><div class="gauge-bar-fill" style="width:${Math.min(txRealiz/65*100,100)}%;background:${corRe}"></div></div>
        <div style="margin-top:8px;">${okRealiz ? '<span class="badge green">✓ Meta atingida</span>' : '<span class="badge red">✗ Abaixo da meta</span>'}</div>
      </div>
    </div>
    <div style="margin-top:14px;padding:12px;background:var(--card2);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--muted);">
      ⓘ Ambos os indicadores precisam ser atingidos simultaneamente para validar a UP.
    </div>
  </div>`;
}

function renderCloser(d, role) {
  const r         = ROLES[role];
  const franquias = d?.franquias_vendidas || 0;
  const caixa     = d?.caixa_realizado;
  const upF       = Math.floor(franquias / r.upF);
  const upC       = caixa != null ? Math.floor(caixa / r.upC) : null;
  const ups       = upC != null ? Math.min(upF, upC) : upF;
  const comissao  = r.comissao(ups);
  const maxUP     = r.maxUP || 6;

  // UP cards
  const upCards = Array.from({length: maxUP}, (_, i) => {
    const u = i + 1;
    const done = u <= ups;
    const current = u === ups;
    return `<div class="up-card${current ? ' active' : ''}">
      <div class="uc-label">${u} UP</div>
      <div class="uc-up" style="color:${done ? 'var(--gold)' : 'var(--dim)'}">${done ? '✓' : u}</div>
      <div class="uc-val">${BRL(r.comissao(u))}</div>
      ${current ? '<div class="uc-badge">VOCÊ ESTÁ AQUI</div>' : ''}
    </div>`;
  }).join('');

  const limStr = upC == null ? '—' :
    upF < upC ? `Franquias (${upF} UP vs Caixa ${upC} UP)` :
    upC < upF ? `Caixa (${upC} UP vs Franquias ${upF} UP)` :
    `Equilibrado — ${ups} UP${ups !== 1 ? 's' : ''}`;

  const nextUP  = ups + 1;
  const needF   = nextUP * r.upF - franquias;
  const needC   = caixa != null ? nextUP * r.upC - caixa : null;

  return `
  <div class="card" style="--accent:var(--gold);">
    <h2 style="--accent:var(--gold);">Resultado — Unidades de Performance</h2>
    <div style="display:flex;align-items:center;gap:20px;margin-bottom:20px;">
      <div>
        <div class="label">UPs completas</div>
        <div style="display:flex;align-items:baseline;gap:8px;margin-top:4px;">
          <span class="big" style="color:${ups >= 2 ? 'var(--gold)' : ups === 1 ? 'var(--amber)' : 'var(--muted)'}">${ups}</span>
          <span style="font-size:16px;color:var(--dim);">UP</span>
        </div>
        <div class="sublabel" style="margin-top:6px;">${limStr}</div>
      </div>
      <div style="flex:1;text-align:right;">
        <div class="label">Comissão variável</div>
        <div class="med" style="color:${comissao > 0 ? 'var(--green)' : 'var(--muted)'};margin-top:4px;">${BRL(comissao)}</div>
      </div>
    </div>
    <div class="up-row">${upCards}</div>
  </div>

  <div class="card" style="--accent:var(--cyan);">
    <h2 style="--accent:var(--cyan);">Componentes da UP</h2>
    <div class="grid2" style="gap:12px;">
      <div class="comp-block" style="--cb-color:var(--blue);">
        <div class="cb-title">Franquias vendidas</div>
        <div style="display:flex;align-items:baseline;gap:8px;">
          <span class="med" style="color:var(--blue);">${franquias}</span>
          <span style="font-size:14px;color:var(--dim);">/ ${(upF + 1) * r.upF}</span>
        </div>
        <div class="sublabel">${upF} UP${upF !== 1 ? 's' : ''} completa${upF !== 1 ? 's' : ''}</div>
        <div class="prog-track">
          <div class="prog-fill" style="width:${Math.min((franquias % r.upF || (franquias > 0 && franquias % r.upF === 0 ? r.upF : 0)) / r.upF * 100, 100)}%;background:var(--blue);"></div>
        </div>
      </div>
      <div class="comp-block" style="--cb-color:var(--green);">
        <div class="cb-title">Caixa realizado</div>
        <div class="med" style="color:var(--green);">${caixa != null ? BRL(caixa) : '—'}</div>
        <div class="sublabel">${upC != null ? upC + ' UP' + (upC !== 1 ? 's' : '') + ' completa' + (upC !== 1 ? 's' : '') : 'Dados indisponíveis'}</div>
        ${caixa != null ? `<div class="prog-track"><div class="prog-fill" style="width:${Math.min((caixa % r.upC) / r.upC * 100, 100)}%;background:var(--green);"></div></div>` : ''}
      </div>
    </div>
    ${nextUP <= maxUP ? `
    <div style="margin-top:12px;padding:12px;background:var(--card2);border:1px solid var(--border);border-radius:8px;">
      <div class="label" style="margin-bottom:6px;">Para a próxima UP (${nextUP} UP → ${BRL(r.comissao(nextUP))})</div>
      <div style="display:flex;gap:16px;font-size:12px;flex-wrap:wrap;">
        <div>Franquias: <span style="color:${needF <= 0 ? 'var(--green)' : 'var(--blue)'};font-weight:700;">${needF > 0 ? '+' + needF : '✓ ok'}</span></div>
        ${needC != null ? `<div>Caixa: <span style="color:${needC <= 0 ? 'var(--green)' : 'var(--amber)'};font-weight:700;">${needC > 0 ? '+' + BRL(needC) : '✓ ok'}</span></div>` : ''}
      </div>
    </div>` : `<div style="margin-top:12px;padding:12px;background:rgba(234,179,8,.05);border:1px solid var(--gold);border-radius:8px;color:var(--gold);font-size:13px;font-weight:700;text-align:center;">🏆 Máximo atingido!</div>`}
  </div>`;
}
</script>
</body>
</html>
